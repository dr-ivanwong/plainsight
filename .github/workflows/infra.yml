# The infra pipeline (cdk spec section 7), separate from the app pipeline by
# design. On PR: invariant tests + cdk-nag + synth always run with no
# credentials; the cdk diff against prod posts as a PR comment once OIDC is
# wired. On merge to main: deploy. Weekly: a drift check that opens an issue
# on any non-empty diff. Deploy, diff, and drift jobs stay dormant until the
# repository variable AWS_DEPLOY_ROLE_ARN is set (see infra/README.md).
#
# Stateful-stack gate (spec section 7): Data and Auth deploy from a dedicated
# job carrying `environment: stateful`, which runs only when a push touches
# their stack files or the config, and before the stateless job so consumers
# never deploy ahead of the state they reference. GitHub auto-creates the
# environment unprotected on first use; the one-click approval starts biting
# once the owner adds a required reviewer to it (runbook, Phase 3 section).
name: infra

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/infra.yml'
  pull_request:
    paths:
      - 'infra/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/infra.yml'
  schedule:
    # Weekly drift check (spec section 7): Sunday 19:00 UTC is Monday 05:00
    # or 06:00 in Sydney.
    - cron: '0 19 * * 0'

jobs:
  # No credentials: the invariant suite, cdk-nag, and a full synth must pass
  # before anything talks to AWS.
  verify:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -C infra typecheck
      - name: Invariants + cdk-nag + snapshot
        run: pnpm -C infra test
      - name: Synth (prod)
        run: pnpm -C infra exec cdk synth --quiet
      - name: Synth (rehearsal overlay)
        run: pnpm -C infra exec cdk synth --quiet --context env=rehearsal
      - name: Synth (features-on overlay, bundles every handler)
        run: pnpm -C infra exec cdk synth --quiet --context features=all

  # The diff is the review artefact (cdk spec section 7). Needs credentials to
  # compare against the deployed state, so it activates with the OIDC role.
  diff:
    needs: verify
    if: github.event_name == 'pull_request' && vars.AWS_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: cdk diff against prod
        run: |
          {
            echo '## `cdk diff` against prod'
            echo '```'
            pnpm -C infra exec cdk diff --no-color 2>&1
            echo '```'
          } > diff.md
      - name: Post the diff as a PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file diff.md --edit-last --create-if-none

  # Decides whether this push touches the stateful stacks. Unknown ranges
  # (force pushes, first pushes) err toward the gate.
  changes:
    if: github.event_name == 'push' && vars.AWS_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      stateful: ${{ steps.detect.outputs.stateful }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          before="${{ github.event.before }}"
          if ! git cat-file -e "$before" 2>/dev/null; then
            echo "stateful=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$before" "${{ github.sha }}" -- \
              infra/lib/stacks/data.ts infra/lib/stacks/auth.ts infra/config | grep -q .; then
            echo "stateful=true" >> "$GITHUB_OUTPUT"
          else
            echo "stateful=false" >> "$GITHUB_OUTPUT"
          fi

  # The stateful-stack gate (spec section 7): Data and Auth deploy behind the
  # environment's one-click approval, and before the stateless job so nothing
  # deploys against state it cannot see yet.
  deploy-stateful:
    needs: [verify, changes]
    if: >-
      github.event_name == 'push' && vars.AWS_DEPLOY_ROLE_ARN != '' &&
      needs.changes.outputs.stateful == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: stateful
    concurrency:
      group: deploy-infra
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: Deploy (stateful stacks only)
        run: pnpm -C infra exec cdk deploy Data Auth --exclusively --require-approval never --concurrency 1

  deploy:
    needs: [verify, changes, deploy-stateful]
    # Runs whether or not the stateful job ran; only its failure blocks.
    if: >-
      !cancelled() && github.event_name == 'push' && vars.AWS_DEPLOY_ROLE_ARN != '' &&
      needs.verify.result == 'success' &&
      (needs.deploy-stateful.result == 'success' || needs.deploy-stateful.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-infra
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: Deploy (stateless stacks)
        # Exclusively, so a stateful change can never ride in as a dependency
        # and bypass the gate above.
        run: >-
          pnpm -C infra exec cdk deploy
          Foundation GithubOidc Ingestion Api StaticSite
          --exclusively --require-approval never --concurrency 1
      - name: Smoke check (stack status)
        # The deploy role's permission boundary allows only assuming the CDK
        # bootstrap roles (the ADR 0001 SCP stand-in), so the read rides the
        # lookup role, exactly as every CDK read does.
        run: |
          account=$(aws sts get-caller-identity --query Account --output text)
          lookup="arn:aws:iam::${account}:role/cdk-hnb659fds-lookup-role-${account}-ap-southeast-2"
          read -r key secret token <<< "$(aws sts assume-role \
            --role-arn "$lookup" --role-session-name infra-smoke \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)"
          export AWS_ACCESS_KEY_ID="$key" AWS_SECRET_ACCESS_KEY="$secret" AWS_SESSION_TOKEN="$token"
          for stack in Foundation GithubOidc Data Ingestion Api StaticSite Auth; do
            aws cloudformation describe-stacks --stack-name "$stack" \
              --query 'Stacks[0].StackStatus' --output text
          done

  # Console-clicked infrastructure is technical debt from the moment it is
  # created; this is the tripwire (cdk spec section 7).
  drift:
    if: github.event_name == 'schedule' && vars.AWS_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: cdk diff, failing on drift
        id: drift
        continue-on-error: true
        run: pnpm -C infra exec cdk diff --fail --no-color 2>&1 | tee drift.txt
      - name: Open an issue on drift
        if: steps.drift.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Infrastructure drift detected $(date -u +%F)"
          {
            echo 'The weekly drift check found the deployed state differs from main.'
            echo
            echo '```'
            cat drift.txt
            echo '```'
          } > body.md
          gh issue create --title "$title" --body-file body.md

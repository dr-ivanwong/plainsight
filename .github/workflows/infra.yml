# The infra pipeline (cdk spec section 7), separate from the app pipeline by
# design. On PR: invariant tests + cdk-nag + synth always run with no
# credentials; the cdk diff against prod posts as a PR comment once OIDC is
# wired. On merge to main: deploy. On manual dispatch: the same deploy of
# current main, for shipping a bundled-handler change that touched no infra
# path. Weekly: a drift check that opens an issue on any non-empty diff.
# Deploy and drift stay dormant until the repository variable
# AWS_DEPLOY_ROLE_ARN is set; the PR diff job has its own read-only role and
# activates with AWS_DIFF_ROLE_ARN (see infra/README.md).
#
# The stateful-stack approval gate was removed by owner decision 2026-07-18
# (spec section 7, amended): the structural protections carry the load
# instead, RETAIN plus deletion protection plus PITR on Data and Auth, the
# invariant suite, and the weekly drift check. Deploys run dependency-ordered
# in one job.
name: infra

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/infra.yml'
  pull_request:
    paths:
      - 'infra/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/infra.yml'
  schedule:
    # Weekly drift check (spec section 7): Sunday 19:00 UTC is Monday 05:00
    # or 06:00 in Sydney.
    - cron: '0 19 * * 0'
  # On-demand deploy. The stacks bundle apps/api and the packages at deploy
  # time, but only infra paths trigger the push deploy above, so a change to
  # a bundled handler (say a apps/api fix) does not ship until an infra
  # change next lands. This lever redeploys current main deliberately:
  # `gh workflow run infra --ref main`. Dispatched on main, the OIDC subject
  # is the trusted ref:refs/heads/main, so it assumes the deploy role like
  # any push.
  workflow_dispatch:

jobs:
  # No credentials: the invariant suite, cdk-nag, and a full synth must pass
  # before anything talks to AWS.
  verify:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -C infra typecheck
      - name: Invariants + cdk-nag + snapshot
        run: pnpm -C infra test
      - name: Synth (prod)
        run: pnpm -C infra exec cdk synth --quiet
      - name: Synth (rehearsal overlay)
        run: pnpm -C infra exec cdk synth --quiet --context env=rehearsal
      - name: Synth (features-on overlay, bundles every handler)
        run: pnpm -C infra exec cdk synth --quiet --context features=all

  # The diff is the review artefact (cdk spec section 7). It needs credentials
  # to read the deployed state, but a pull_request run presents an OIDC
  # subject the deploy role deliberately refuses (deploys stay main-only), so
  # the job rides its own read-only role, which may only assume the CDK
  # lookup role.
  diff:
    needs: verify
    if: github.event_name == 'pull_request' && vars.AWS_DIFF_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DIFF_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: cdk diff against prod
        # --no-change-set: changeset analysis would need the deploy role,
        # which this read-only job cannot (and should not) assume; the
        # template diff is the review artefact.
        run: |
          {
            echo '## `cdk diff` against prod'
            echo '```'
            pnpm -C infra exec cdk diff --no-change-set --no-color 2>&1
            echo '```'
          } > diff.md
      - name: Post the diff as a PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file diff.md --edit-last --create-if-none

  deploy:
    needs: verify
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.AWS_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-infra
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: Deploy (all stacks, dependency-ordered)
        run: pnpm -C infra exec cdk deploy --all --require-approval never --concurrency 1
      - name: Smoke check (stack status)
        # The deploy role's permission boundary allows only assuming the CDK
        # bootstrap roles (the ADR 0001 SCP stand-in), so the read rides the
        # lookup role, exactly as every CDK read does.
        run: |
          account=$(aws sts get-caller-identity --query Account --output text)
          lookup="arn:aws:iam::${account}:role/cdk-hnb659fds-lookup-role-${account}-ap-southeast-2"
          read -r key secret token <<< "$(aws sts assume-role \
            --role-arn "$lookup" --role-session-name infra-smoke \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)"
          export AWS_ACCESS_KEY_ID="$key" AWS_SECRET_ACCESS_KEY="$secret" AWS_SESSION_TOKEN="$token"
          for stack in Foundation GithubOidc Data Ingestion Api StaticSite Auth; do
            aws cloudformation describe-stacks --stack-name "$stack" \
              --query 'Stacks[0].StackStatus' --output text
          done

  # Console-clicked infrastructure is technical debt from the moment it is
  # created; this is the tripwire (cdk spec section 7).
  drift:
    if: github.event_name == 'schedule' && vars.AWS_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: cdk diff, failing on drift
        id: drift
        continue-on-error: true
        run: pnpm -C infra exec cdk diff --fail --no-color 2>&1 | tee drift.txt
      - name: Open an issue on drift
        if: steps.drift.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Infrastructure drift detected $(date -u +%F)"
          {
            echo 'The weekly drift check found the deployed state differs from main.'
            echo
            echo '```'
            cat drift.txt
            echo '```'
          } > body.md
          gh issue create --title "$title" --body-file body.md

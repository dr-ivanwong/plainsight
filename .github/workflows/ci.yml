# The app pipeline (main plan section 7): typecheck, test, build on every
# change; deploy the built PWA to prod on merge to main once the AWS side
# exists. Deploy jobs stay dormant until the repository variables are set
# (see infra/README.md); everything else is green from day one with no AWS
# account at all. Style checks run in style.yml; infra deploys in infra.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (tsc --noEmit, every workspace)
        run: pnpm -r typecheck
      - name: Test (calc-engine enforces 100% branch coverage; web runs the token contrast gate)
        run: pnpm -r test
      - name: Build
        run: pnpm -r build

  # Ships apps/web/dist to the site bucket and invalidates the edge cache.
  # Cache policy per the cdk spec section 3: hashed assets are immutable for a
  # year; index.html is never cached (and later, neither is the service
  # worker script). Requires the repository variables AWS_SITE_DEPLOY_ROLE_ARN,
  # SITE_BUCKET, and DISTRIBUTION_ID from the StaticSite stack outputs.
  deploy-web:
    needs: ci
    if: github.event_name == 'push' && vars.AWS_SITE_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-web
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_SITE_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: Sync immutable assets
        run: |
          aws s3 sync apps/web/dist "s3://${{ vars.SITE_BUCKET }}" \
            --delete \
            --exclude index.html \
            --cache-control 'public,max-age=31536000,immutable'
      - name: Upload index.html (never cached)
        run: |
          aws s3 cp apps/web/dist/index.html "s3://${{ vars.SITE_BUCKET }}/index.html" \
            --cache-control 'no-cache' \
            --content-type 'text/html; charset=utf-8'
      - name: Invalidate the shell
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.DISTRIBUTION_ID }}" \
            --paths '/index.html' '/'
      - name: Smoke check
        if: vars.SITE_ORIGIN != ''
        run: curl --silent --fail --show-error "${{ vars.SITE_ORIGIN }}" | grep -q Plainsight

# The app pipeline (main plan section 7): typecheck, test, build on every
# change; deploy the built PWA to prod on merge to main once the AWS side
# exists. Deploy jobs stay dormant until the repository variables are set
# (see infra/README.md); everything else is green from day one with no AWS
# account at all. Style checks run in style.yml; infra deploys in infra.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # reads packageManager from package.json
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (tsc --noEmit, every workspace)
        run: pnpm -r typecheck
      - name: Test (calc-engine enforces 100% branch coverage; web runs the token contrast gate)
        run: pnpm -r test
      - name: Build
        run: pnpm -r build
      - name: Bundle budget (initial JS inside the pinned ceiling, main plan section 5)
        run: node scripts/check-bundle.mjs

  # The Phase 1 exit criterion: Journey A completes in airplane mode, on
  # Chromium and WebKit, against the built app with its service worker.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm -C apps/web exec playwright install --with-deps chromium webkit
      - name: Journey A in airplane mode
        run: pnpm -C apps/web e2e

  # Ships apps/web/dist to the site bucket and invalidates the edge cache.
  # Cache policy per the cdk spec section 3: hashed assets are immutable for a
  # year; index.html, the service worker script, and the manifest are never
  # cached, so updates land on the next visit. Requires the repository
  # variables AWS_SITE_DEPLOY_ROLE_ARN, SITE_BUCKET, and DISTRIBUTION_ID from
  # the StaticSite stack outputs. Deploy waits for the unit gate and the
  # journeys both: the pinned pipeline order (main plan section 7) puts the
  # Playwright run before prod, and on 2026-07-18 two commits with a failing
  # journey shipped because only the unit gate held the door.
  deploy-web:
    needs: [ci, e2e]
    if: github.event_name == 'push' && vars.AWS_SITE_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-web
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_SITE_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: Sync immutable assets
        run: |
          aws s3 sync apps/web/dist "s3://${{ vars.SITE_BUCKET }}" \
            --delete \
            --exclude index.html \
            --exclude sw.js \
            --exclude manifest.webmanifest \
            --cache-control 'public,max-age=31536000,immutable'
      - name: Upload the never-cached shell files
        run: |
          aws s3 cp apps/web/dist/index.html "s3://${{ vars.SITE_BUCKET }}/index.html" \
            --cache-control 'no-cache' \
            --content-type 'text/html; charset=utf-8'
          aws s3 cp apps/web/dist/sw.js "s3://${{ vars.SITE_BUCKET }}/sw.js" \
            --cache-control 'no-cache' \
            --content-type 'text/javascript; charset=utf-8'
          aws s3 cp apps/web/dist/manifest.webmanifest "s3://${{ vars.SITE_BUCKET }}/manifest.webmanifest" \
            --cache-control 'no-cache' \
            --content-type 'application/manifest+json'
      - name: Invalidate the shell
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.DISTRIBUTION_ID }}" \
            --paths '/index.html' '/' '/sw.js' '/manifest.webmanifest'
      - name: Smoke check
        if: vars.SITE_ORIGIN != ''
        run: curl --silent --fail --show-error "${{ vars.SITE_ORIGIN }}" | grep -q Plainsight
